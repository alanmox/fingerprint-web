services:
  - type: web
    name: fingerprint-web
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_RP_NAME
        value: ALLANMOX
      - key: NEXT_PUBLIC_RP_ID
        sync: false
      - key: ORIGIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fingerprint-web-db
          property: connectionString

databases:
  - name: fingerprint-web-db
    plan: free
